# NemoClaw — Dokploy deployment configuration
#
# Required environment variables (set in Dokploy → Environment tab):
#   NVIDIA_API_KEY              - Your NVIDIA API key from https://build.nvidia.com
#   CHAT_UI_URL                 - Your public URL (auto-generated traefik.me or custom domain)
#
# Build args (Dokploy → Build Args, or leave defaults):
#   NEMOCLAW_MODEL              - Model ID (default: nvidia/nemotron-3-super-120b-a12b)
#   NEMOCLAW_INFERENCE_BASE_URL - Inference API (default: https://integrate.api.nvidia.com/v1)
#   NEMOCLAW_DISABLE_DEVICE_AUTH- Set to 1 to skip device-pairing auth (recommended for cloud)

services:
  nemoclaw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEMOCLAW_MODEL: ${NEMOCLAW_MODEL:-MiniMax-M2.7}
        NEMOCLAW_PROVIDER_KEY: ${NEMOCLAW_PROVIDER_KEY:-nvidia}
        NEMOCLAW_PRIMARY_MODEL_REF: ${NEMOCLAW_MODEL:-MiniMax-M2.7}
        NEMOCLAW_INFERENCE_BASE_URL: ${NEMOCLAW_INFERENCE_BASE_URL:-https://integrate.api.nvidia.com/v1}
        NEMOCLAW_INFERENCE_API: ${NEMOCLAW_INFERENCE_API:-openai-completions}
        CHAT_UI_URL: ${CHAT_UI_URL:-http://localhost:18789}
        # Set to "1" to skip device-pairing auth — recommended for cloud deployments
        NEMOCLAW_DISABLE_DEVICE_AUTH: ${NEMOCLAW_DISABLE_DEVICE_AUTH:-1}
        # Change this value to force a fresh image build and rotate the auth token
        NEMOCLAW_BUILD_ID: ${NEMOCLAW_BUILD_ID:-dokploy-1}

    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - CHAT_UI_URL=${CHAT_UI_URL:-http://localhost:18789}
      - HOST=0.0.0.0
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ALLOWED_CHAT_IDS=${ALLOWED_CHAT_IDS}
      - NEMOCLAW_DISABLE_DEVICE_AUTH=${NEMOCLAW_DISABLE_DEVICE_AUTH:-1}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}

    # Override the default CMD ("/bin/bash") which exits immediately in background.
    # The entrypoint script strips this word, allowing the gateway daemon to start.
    command: ["nemoclaw-start"]

    # Persist agent workspace, identity, memory, and devices across restarts
    volumes:
      - nemoclaw-data:/sandbox/.openclaw-data

    # OpenClaw gateway serves the Web UI on port 18789.
    # Exposing the port so you can access it directly via IP:18789 as a fallback.
    ports:
      - "18789:18789"

    restart: unless-stopped

    # ── Traefik routing ──────────────────────────────────────────────────
    # Removed manual labels to avoid conflicts with Dokploy UI.
    # Set the domain and port (18789) in the Dokploy "Domains" tab.
    labels:
      - "traefik.enable=true"

    networks:
      - dokploy-network

volumes:
  nemoclaw-data:
    driver: local

networks:
  dokploy-network:
    external: true

